<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Day Night Blob Widget</title>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 22px;
      min-height: 100vh;
      background: #f2edff;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      font-family: Arial, sans-serif;
    }

    #wrap {
      position: relative;
      width: min(220px, 78vw);
      height: min(220px, 78vw);
      cursor: pointer;
      filter: drop-shadow(0 6px 28px rgba(119,48,236,0.38));
      transition: filter 1s cubic-bezier(0.4,0,0.2,1);
    }

    #blobOuter {
      position: absolute;
      inset: 0;
      overflow: hidden;
      clip-path: path('M 112 6 C 158 2 208 36 214 80 C 220 124 198 172 162 192 C 126 212 76 216 44 194 C 12 172 -4 128 6 88 C 16 48 52 14 88 8 C 96 6 104 6 112 6 Z');
      animation: breathe 4.5s ease-in-out infinite;
    }

    #blobFill {
      position: absolute;
      inset: 0;
      background: #7730ec;
    }

    @keyframes breathe {
      0%, 100% {
        clip-path: path('M 112 6 C 158 2 208 36 214 80 C 220 124 198 172 162 192 C 126 212 76 216 44 194 C 12 172 -4 128 6 88 C 16 48 52 14 88 8 C 96 6 104 6 112 6 Z');
      }

      50% {
        clip-path: path('M 108 8 C 154 4 204 40 210 84 C 216 128 200 168 168 188 C 136 208 82 218 50 198 C 18 178 -2 132 8 92 C 18 52 54 16 90 10 C 98 8 108 8 108 8 Z');
      }
    }

    .cel {
      position: absolute;
      top: 110px;
      left: 110px;
      will-change: transform;
    }

    #sun {
      width: 26px;
      height: 26px;
      background: white;
      border-radius: 50%;
      box-shadow: 0 0 10px 4px rgba(255,255,255,0.35);
    }

    #wave {
      position: absolute;
      bottom: -4px;
      left: -22px;
      width: 264px;
      height: 132px;
      animation: waveFloat 3.6s ease-in-out infinite;
    }

    @keyframes waveFloat {
      0% { transform: translateX(0px); }
      28% { transform: translateX(-11px); }
      60% { transform: translateX(9px); }
      100% { transform: translateX(0px); }
    }

    .label-wrap {
      position: relative;
      height: 16px;
      width: 80px;
      pointer-events: none;
    }

    .lbl {
      position: absolute;
      inset: 0;
      text-align: center;
      font-family: "Courier New", monospace;
      font-size: 11px;
      letter-spacing: 0.22em;
      font-weight: 700;
    }
  </style>
</head>

<body>
  <div id="wrap" onclick="toggle()">
    <div id="blobOuter">
      <div id="blobFill">

        <div id="sun" class="cel"></div>

        <div id="moon" class="cel">
          <svg width="24" height="24" viewBox="0 0 24 24">
            <path fill="white" d="M12.5 23.5a11.5 11.5 0 0 0 9.934-5.731 11.5 11.5 0 0 1-10.148-11.412 11.5 11.5 0 0 1 1.564-5.767 11.5 11.5 0 0 0-1.35-.09 11.5 11.5 0 0 0-11.5 11.5 11.5 11.5 0 0 0 11.5 11.5z"/>
          </svg>
        </div>

        <svg id="wave" viewBox="0 0 264 132">
          <path id="w1" d="M0,44 C20,36 46,20 78,27 C110,34 130,50 158,52 C183,54 210,43 242,37 L264,37 L264,132 L0,132 Z" fill="#a8cfe0"/>
          <path id="w2" d="M0,63 C30,55 60,67 90,63 C120,59 144,47 180,52 C208,56 236,49 264,56 L264,132 L0,132 Z" fill="#c4dfe9"/>
          <rect id="w3" y="79" width="264" height="53" fill="#dff0f6"/>
        </svg>

      </div>
    </div>
  </div>

  <div class="label-wrap">
    <span id="lNight" class="lbl" style="color:#7730ec;">NIGHT</span>
    <span id="lDay" class="lbl" style="color:#b8920e; opacity:0;">DAY</span>
  </div>

  <script>
    const blobFill = document.getElementById('blobFill');
    const sun = document.getElementById('sun');
    const moon = document.getElementById('moon');
    const lN = document.getElementById('lNight');
    const lD = document.getElementById('lDay');
    const wrap = document.getElementById('wrap');
    const w1 = document.getElementById('w1');
    const w2 = document.getElementById('w2');
    const w3 = document.getElementById('w3');

    const WAVE = [
      { night: '#1e3a5f', day: '#3aa0c4' },
      { night: '#2a4f78', day: '#6dc0d8' },
      { night: '#3a6490', day: '#a8dde8' }
    ];

    const R = 68;
    const BASE_SPEED = 0.00028;
    const CLICK_SPEED = 0.018;
    const DECAY = 0.994;

    let angle = Math.PI;
    let velocity = BASE_SPEED;
    let lastTs = null;
    let lastShadowIsDaytime = false;

    const lerp = (a, b, t) => a + (b - a) * t;

    function hexRgb(h) {
      return [
        parseInt(h.slice(1, 3), 16),
        parseInt(h.slice(3, 5), 16),
        parseInt(h.slice(5, 7), 16)
      ];
    }

    function mixColor(h1, h2, t) {
      const [r1, g1, b1] = hexRgb(h1);
      const [r2, g2, b2] = hexRgb(h2);

      return `rgb(${Math.round(lerp(r1, r2, t))},${Math.round(lerp(g1, g2, t))},${Math.round(lerp(b1, b2, t))})`;
    }

    function apply(a) {
      const cp = (1 + Math.cos(a)) / 2;

      document.body.style.background = mixColor('#f2edff', '#f5f4ee', cp);
      blobFill.style.background = mixColor('#7730ec', '#fcce18', cp);

      const sx = R * Math.sin(a);
      const sy = -R * Math.cos(a);

      sun.style.transform = `translate(${sx - 13}px, ${sy - 13}px)`;
      moon.style.transform = `translate(${-sx - 12}px, ${-sy - 12}px)`;

      const HORIZON = 20;
      const FADE = 22;

      sun.style.opacity = Math.max(0, Math.min(1, (HORIZON + FADE - sy) / FADE));
      moon.style.opacity = Math.max(0, Math.min(1, (HORIZON + FADE + sy) / FADE));

      lN.style.opacity = 1 - cp;
      lD.style.opacity = cp;

      w1.setAttribute('fill', mixColor(WAVE[0].night, WAVE[0].day, cp));
      w2.setAttribute('fill', mixColor(WAVE[1].night, WAVE[1].day, cp));
      w3.setAttribute('fill', mixColor(WAVE[2].night, WAVE[2].day, cp));

      const isDaytime = cp > 0.5;

      if (isDaytime !== lastShadowIsDaytime) {
        lastShadowIsDaytime = isDaytime;
        wrap.style.filter = isDaytime
          ? 'drop-shadow(0 6px 28px rgba(252,206,24,0.42))'
          : 'drop-shadow(0 6px 28px rgba(119,48,236,0.38))';
      }
    }

    function loop(ts) {
      if (lastTs !== null) {
        const dt = Math.min(ts - lastTs, 50);
        angle += velocity * dt;
        velocity = BASE_SPEED + (velocity - BASE_SPEED) * Math.pow(DECAY, dt);
        apply(angle);
      }

      lastTs = ts;
      requestAnimationFrame(loop);
    }

    function toggle() {
      velocity = CLICK_SPEED;
    }

    apply(Math.PI);
    requestAnimationFrame(loop);
  </script>
</body>
</html>
