  <style>

      width: min(100%, 192px);

      padding: 0;
      border: 0;
      overflow: hidden;
      background: transparent;
      cursor: pointer;

      user-select: none;
      transform: translate3d(0, 0, 0);

    }
    button:focus-visible {
      outline: 2px solid #8b8b8b;
      outline-offset: 2px;
      border-radius: 4px;
    }
    @media (prefers-reduced-motion: reduce) {
      button { cursor: default; }
    }

  </button>
  <script>
    (() => {
      const button = document.querySelector("#luca");
      const image = button.querySelector("img");
      const reducedMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;
      let mode = "idle";
      let frame = 0;
      let timer = 0;

      function draw(index) {
        image.style.transform = `translate3d(-${index * 10}%, 0, 0)`;
      }

      function schedule() {
        clearTimeout(timer);
        if (reducedMotion) {
          draw(0);
          return;
        }

        const start = mode === "wave" ? 6 : 0;
        const count = mode === "wave" ? 4 : 6;
        draw(start + frame);
        frame += 1;

        if (frame >= count) {
          frame = 0;
          if (mode === "wave") mode = "idle";
        }
        timer = setTimeout(schedule, mode === "wave" ? 170 : 360);
      }

      function wave() {
        if (reducedMotion) return;
        mode = "wave";
        frame = 0;
        schedule();
      }

      if (image.complete) schedule();
      else image.addEventListener("load", schedule, { once: true });
      button.addEventListener("pointerdown", wave);
    })();
  </script>
